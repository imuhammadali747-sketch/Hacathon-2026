<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
</head>
<body>
    <div class="all">
        <div class="left">
            <div class="menu">
                <div class="name">
                    <h1>The Gallery</h1>
                    <p>Editorial Dashboard</p>
                </div>
            </div>
            <div class="dashboard">
                <nav>
                    <ul>
                        <li><i class="fa-solid fa-gauge-high"></i> Dashboard</li>
                        <li><i class="fa-solid fa-bag-shopping"></i> Orders</li>
                        <li><i class="fa-solid fa-kitchen-set"></i> Menu</li>
                        <li><i class="fa-solid fa-user-group"></i> Customers</li>
                        <li><i class="fa-regular fa-clock"></i> Analytics</li>
                        <li><i class="fa-solid fa-gear"></i> Setting</li>
                    </ul>
                </nav>
            </div>
        </div>
        <div class="right">
            <nav>
                <div class="search">
                    <i class="fa-solid fa-magnifying-glass"></i>        <input type="search" placeholder="Search dosserts">
                </div>
                <div class="about">
                    <div class="all">
                        <div class="icon">
                            <i class="fa-regular fa-bell"></i>
                        </div>
                        <div class="name">
                            <h2>Chef de Cuisine</h2>
                            <p>Executive Pastry Chef</p>
                        </div>
                        <img src="./about.png" alt="">
                    </div>
                </div>
            </nav>
            <section>
                <div class="order">
                    <img src="./cake.png" alt="">
                    <div class="information">
                        <div class="starts">
                            <h3></h3>
                            <i class="fa-regular fa-star">4.9</i>
                        </div>
                        <div class="name">
                            <h1>Chocolate Lava Cake</h1>
                            <div class="p">
                                <p><i class="fa-regular fa-clock"></i> 25 min</p>
                                <p><i class="fa-regular fa-clock"></i>Easy</p>
                                <p>450 kcal</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
